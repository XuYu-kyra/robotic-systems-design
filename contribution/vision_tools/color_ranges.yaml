# HSV 范围配置（依据你的相机需用 hsv_calibrate.py 实测后更新）
# 注意：H ∈ [0,180]，S,V ∈ [0,255]
# 红色用双区间 red1 + red2 合并

red:
  - [0, 120, 70, 10, 255, 255]
  - [170, 120, 70, 180, 255, 255]


blue:
  - [90, 50, 50, 130, 255, 255]

yellow:
  - [20, 80, 80, 35, 255, 255]
  - [10, 120, 70, 25, 255, 255]

#green:
 # - [35, 60, 60, 85, 255, 255]

#orange:
  #- [10, 120, 70, 25, 255, 255]

#purple:
 # - [130, 60, 60, 160, 255, 255]

# 主色判定阈值（ROI 内像素占比）
color_ratio_threshold:
  default: 0.18
  blue: 0.10
